<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenGIS Viewer</title>
    <link rel="stylesheet" href="https://js.arcgis.com/4.29/@arcgis/core/assets/esri/themes/light/main.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="portalContainer">
       <div class="login-bar" style="flex-direction: column; gap: 8px;">
            <input type="text" id="portalUrlInput" placeholder="Portaal URL (bijv. https://.../portal)" value="https://gisportal-test.boskalis.com/portal">
            <input type="text" id="appIdInput" placeholder="App-ID (bijv. oXxSEcZ4TXxuIl62)">
            <button id="loginBtn">Inloggen</button>
        </div>
        <div id="contentPanel" style="display: none;">
            <h3 id="panelTitle">Mijn Groepen</h3>
            <button id="backBtn" style="display: none;">&larr; Terug naar groepen</button>
            <div id="listContainer" class="list-container"></div>
        </div>
    </div>

    <div id="viewDiv"></div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
