<!DOCTYPE html>

<html lang="nl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OpenGIS Viewer</title>

    <link rel="stylesheet" href="https://js.arcgis.com/4.29/@arcgis/core/assets/esri/themes/light/main.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>



<div id="loginPanel" class="center-modal">

        <h3>Verbind met Portaal</h3>

        <input type="text" id="portalUrlInput" placeholder="Portaal URL" value="https://gisportal-test.boskalis.com/portal">

        <input type="text" id="appIdInput" placeholder="App-ID">

        <button id="loginBtn" class="primary-btn">Inloggen</button>

    </div>



    <div id="profileWidget" style="display: none;">

        <img id="userAvatar" src="https://www.w3schools.com/howto/img_avatar.png" alt="Profiel">

       

        <div id="profileDropdown" style="display: none;">

            <div style="font-size: 13px; color: #555;">Ingelogd als:</div>

            <strong id="userNameDisplay">Gebruiker</strong>

            <hr>

            <div style="font-size: 13px; color: #555;">Actieve WebMap:</div>

            <div id="activeMapDisplay" style="font-weight: bold; margin-bottom: 10px; color: #005e9e;">Geen</div>

            <button id="openWebmapBtn" class="primary-btn">Open WebMap...</button>

            <button id="logoutBtn" class="secondary-btn" style="margin-top: 5px;">Log uit</button>

        </div>

    </div>



    <div id="webmapModalOverlay" class="modal-overlay" style="display: none;">

        <div class="center-modal" style="width: 400px; max-height: 80vh; overflow-y: auto;">

            <div style="display: flex; justify-content: space-between; align-items: center;">

                <h3 id="panelTitle" style="margin: 0;">Mijn Groepen</h3>

                <button id="closeModalBtn" style="background: none; border: none; font-size: 20px; cursor: pointer;">&times;</button>

            </div>

            <button id="backBtn" style="display: none; margin-top: 10px;">&larr; Terug naar groepen</button>

            <div id="listContainer" class="list-container"></div>

        </div>

    </div>

    <div id="customLayerPanel" class="custom-layer-panel" style="display: none;">

        <h4>Kaartlagen</h4>

        <div id="customLayerList"></div>

    </div>

    <div id="viewDiv"></div>



    <script type="module" src="js/main.js"></script>

</body>

</html>
